name: publish-npm-packages

# Publish public workspaces to npm via OIDC Trusted Publishing (tokenless).
#
# Trigger this manually from the Actions tab ("Run workflow"). You stay in
# control of *when* a release happens — the job only runs what you trigger.
# It publishes every public package whose version is not yet on the registry,
# so bumping a subset and triggering a release publishes just that subset.
#
# One-time prerequisite: configure a Trusted Publisher for each package on
# npmjs.com (repo vincent-kk/albatrion, workflow publish-npm-packages.yml). See
# scripts/PUBLISHING.md.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Pack + registry diff only, do not publish"
        type: boolean
        default: false

# Never run two releases at once; do not cancel an in-flight publish.
concurrency:
  group: publish-npm-packages
  cancel-in-progress: false

jobs:
  publish:
    name: publish public packages (OIDC)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # required: push per-package git tags after publishing
      id-token: write # required: npm exchanges this OIDC token for a publish token
    env:
      # node 22 LTS: required by npm 12 (the OIDC publish tool). Dev/bench pin
      # node 20 (.nvmrc), but the published build output is deterministic across
      # node versions (rollup/tsc), so building the release on 22 is safe.
      NODE_VERSION: "22"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history + tags so tag-packages.sh can skip already-created tags.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"

      - name: Enable Corepack
        run: corepack enable

      - name: Upgrade npm for OIDC (>= 11.5.1)
        # node 22 still bundles npm 10.x; Trusted Publishing needs npm >= 11.5.1.
        # npm@latest (v12) requires node >= 22.22.2, satisfied by node 22 LTS.
        run: npm install -g npm@latest

      - name: Install
        run: yarn install --immutable

      - name: Build all workspaces
        run: yarn build:all

      - name: Publish changed packages
        env:
          DRY_RUN: ${{ inputs.dry_run }}
        run: ./scripts/publish-packages.sh

      - name: Tag & push published versions
        # Real runs only, and only if publish succeeded. success() is explicit
        # because a custom `if:` does not reliably inherit the implicit success()
        # gate — without it a failed publish could still tag HEAD.
        # Tags every non-private package version at HEAD, skipping existing tags.
        if: ${{ !inputs.dry_run && success() }}
        run: ./scripts/tag-packages.sh HEAD --push --yes
